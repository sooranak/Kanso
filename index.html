<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Kanso Beta 1</title>
<style>
body{margin:0;background:#F7F4EE;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#333}
.wrap{max-width:1200px;margin:auto;padding:12px;box-sizing:border-box}
.controls{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:12px}
button,select{padding:10px 14px;border:1px solid #cfc8bc;border-radius:10px;background:#fff;font-size:16px}
#three{display:none;grid-template-columns:repeat(3,1fr);gap:10px}
.card{background:#fff;border:1px solid #d8d1c5;border-radius:12px;padding:10px;min-height:110px;display:flex;flex-direction:column;justify-content:center;text-align:center;box-sizing:border-box}
.label{font-size:12px;color:#777;margin-bottom:6px}
#nine{display:none;position:relative;width:min(96vw,1100px);aspect-ratio:1/1.08;margin:0 auto}
.p{position:absolute;width:24%;height:18%;background:#fff;border:1px solid #d8d1c5;border-radius:12px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:6px;box-sizing:border-box;font-size:clamp(10px,1.6vw,16px)}
@media(max-width:700px){
#three .card{min-height:95px;font-size:13px}
#nine{width:98vw}
}
</style></head><body><div class="wrap">
<div class="controls">
<select id="spread"><option value="3">Three Card Spread</option><option value="9">Nine Card Spread</option></select>
<button id="draw">Shuffle &amp; Draw</button>
</div>
<div id="three"></div>
<div id="nine"></div>
</div>
<script>
const DECK=[
'0. The Fool',
'I. The Magician',
'II. The High Priestess',
'III. The Empress',
'IV. The Emperor',
'V. The Hierophant',
'VI. The Lovers',
'VII. The Chariot',
'VIII. Strength',
'IX. The Hermit',
'X. Wheel of Fortune',
'XI. Justice',
'XII. The Hanged Man',
'XIII. Death',
'XIV. Temperance',
'XV. The Devil',
'XVI. The Tower',
'XVII. The Star',
'XVIII. The Moon',
'XIX. The Sun',
'XX. Judgement',
'XXI. The World',
'Ace of Wands',
'Two of Wands',
'Three of Wands',
'Four of Wands',
'Five of Wands',
'Six of Wands',
'Seven of Wands',
'Eight of Wands',
'Nine of Wands',
'Ten of Wands',
'Page of Wands',
'Knight of Wands',
'Queen of Wands',
'King of Wands',
'Ace of Cups',
'Two of Cups',
'Three of Cups',
'Four of Cups',
'Five of Cups',
'Six of Cups',
'Seven of Cups',
'Eight of Cups',
'Nine of Cups',
'Ten of Cups',
'Page of Cups',
'Knight of Cups',
'Queen of Cups',
'King of Cups',
'Ace of Swords',
'Two of Swords',
'Three of Swords',
'Four of Swords',
'Five of Swords',
'Six of Swords',
'Seven of Swords',
'Eight of Swords',
'Nine of Swords',
'Ten of Swords',
'Page of Swords',
'Knight of Swords',
'Queen of Swords',
'King of Swords',
'Ace of Pentacles',
'Two of Pentacles',
'Three of Pentacles',
'Four of Pentacles',
'Five of Pentacles',
'Six of Pentacles',
'Seven of Pentacles',
'Eight of Pentacles',
'Nine of Pentacles',
'Ten of Pentacles',
'Page of Pentacles',
'Knight of Pentacles',
'Queen of Pentacles',
'King of Pentacles'
];
const threeLabels=["Past","Present","Future"];
const nineLabels=["1","2","3","4","5","6","7","8","9"];
const pos=[
[38,2],[10,21],[38,21],[66,21],[38,41],[24,61],[52,61],[24,81],[52,81]
];
const three=document.getElementById('three');
const nine=document.getElementById('nine');
const draw=document.getElementById('draw');
const spread=document.getElementById('spread');
function rand(max){
 if(window.crypto&&crypto.getRandomValues){
   const a=new Uint32Array(1);crypto.getRandomValues(a);
   return a[0]%max;
 }
 return Math.floor(Math.random()*max);
}
function shuffle(arr){
 const a=arr.slice();
 for(let i=a.length-1;i>0;i--){const j=rand(i+1);const t=a[i];a[i]=a[j];a[j]=t;}
 return a;
}
function makeCard(label,name,cls){
 const d=document.createElement('div');d.className=cls;
 const l=document.createElement('div');l.className='label';l.textContent=label;
 const n=document.createElement('div');n.textContent=name;
 d.appendChild(l);d.appendChild(n);return d;
}
draw.addEventListener('click',function(){
 const deck=shuffle(DECK);
 three.innerHTML='';nine.innerHTML='';
 if(spread.value==='3'){
   three.style.display='grid';nine.style.display='none';
   for(let i=0;i<3;i++)three.appendChild(makeCard(threeLabels[i],deck[i],'card'));
 } else {
   three.style.display='none';nine.style.display='block';
   for(let i=0;i<9;i++){const c=makeCard(nineLabels[i],deck[i],'p');c.style.left=pos[i][0]+'%';c.style.top=pos[i][1]+'%';nine.appendChild(c);}
 }
});
</script></body></html>
