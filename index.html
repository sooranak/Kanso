<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kanso Tarot</title><style>
body{background:#F7F4EE;color:#2B2B2B;font-family:-apple-system,sans-serif;margin:0}
.wrap{max-width:800px;margin:auto;padding:24px}.panel{background:#fff;border:1px solid #DDD6CC;border-radius:12px;padding:18px;margin-bottom:18px}
button{width:100%;padding:14px}.grid3,.grid9{display:grid;gap:12px}.grid9{grid-template-columns:repeat(3,1fr)}.card{border:1px solid #DDD6CC;border-radius:10px;padding:12px;background:#fff}
@media(max-width:650px){.grid9{grid-template-columns:1fr}}
</style></head><body><div class="wrap"><h1>Kanso Tarot</h1>
<div class="panel">
<label><input type="radio" name="s" value="3" checked> Three Cards</label><br>
<label><input type="radio" name="s" value="9"> Nine Cards</label><br><br>
<label><input id="rev" type="checkbox" checked> Include reversals</label><br><br>
<button onclick="draw()">Shuffle & Draw</button></div>
<div id="out"></div></div>
<script>
const deck=[];const majors=['The Fool','The Magician','The High Priestess','The Empress','The Emperor','The Hierophant','The Lovers','The Chariot','Strength','The Hermit','Wheel of Fortune','Justice','The Hanged Man','Death','Temperance','The Devil','The Tower','The Star','The Moon','The Sun','Judgement','The World'];majors.forEach(x=>deck.push(x));
["Wands","Cups","Swords","Pentacles"].forEach(s=>["Ace","2","3","4","5","6","7","8","9","10","Page","Knight","Queen","King"].forEach(r=>deck.push(r+" of "+s)));
function rr(m){if(window.crypto&&crypto.getRandomValues){let a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]%m;}return Math.floor(Math.random()*m);}
function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=rr(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function draw(){let n=document.querySelector('input[name="s"]:checked').value=="3"?3:9;let d=sh(deck);let labels=["Past","Present","Future"];let g='<div class="panel"><div class="'+(n==3?'grid3':'grid9')+'">';
for(let i=0;i<n;i++){let pos=n==3?labels[i]:'Position '+(i+1);let rev=document.getElementById('rev').checked&&rr(2);g+='<div class="card"><small>'+pos+'</small><h3>'+d[i]+'</h3><div>'+(rev?'Reversed':'Upright')+'</div></div>';}
g+='</div></div>';document.getElementById('out').innerHTML=g;}
draw();
</script></body></html>
